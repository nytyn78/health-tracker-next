<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#00695C;--lt-teal:#E0F2F1;--gold:#F57F17;--lt-gold:#FFF8E1;
  --dark:#1A1A2E;--red:#E53935;--green:#388E3C;--bg:#F4F7F6;
  --font:Georgia,"Times New Roman",serif;--mono:"Courier New",monospace;
  --shadow:0 2px 14px rgba(0,0,0,0.07);--radius:16px;
}
body{background:var(--bg);font-family:var(--font);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}
button{font-family:var(--font);cursor:pointer}
input{font-family:var(--font);outline:none}
.card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.inp{padding:9px 13px;border:1.5px solid #DDD;border-radius:10px;font-size:14px;width:100%;transition:border .2s;background:#fff}
.inp:focus{border-color:var(--teal)}
.sec{font-size:14px;font-weight:700;color:var(--teal);margin-bottom:12px}

.tabs{display:flex;gap:4px;padding:10px 12px;background:#fff;border-bottom:1px solid #EEE;overflow-x:auto;position:sticky;top:0;z-index:100}
.tab{padding:7px 13px;border-radius:20px;border:none;font-size:12px;white-space:nowrap;font-family:var(--font);transition:all .2s}
.tab.on{background:var(--teal);color:#fff;font-weight:700}
.tab:not(.on){background:transparent;color:#666}
.stab{padding:6px 13px;border-radius:14px;border:none;font-size:12px;font-family:var(--font);transition:all .2s}
.stab.on{background:var(--dark);color:#fff;font-weight:700}
.stab:not(.on){background:#F0F0F0;color:#666}
  .card{animation:fadeUp .18s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  
  
  
  
.hdr{background:linear-gradient(135deg,var(--dark) 0%,var(--teal) 100%);padding:22px 18px 18px;color:#fff}
.content{padding:14px 14px 90px}
.meal-hdr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1.5px solid #E8F0EE;background:#F8FFFE;margin-bottom:0}
.meal-hdr
.meal-detail{padding:12px 14px;background:#FAFFFE;border:1.5px solid var(--teal);border-top:none;border-radius:0 0 10px 10px;margin-bottom:6px}
.excard{padding:12px 14px;border-radius:12px;margin-bottom:8px;border:1px solid #EEE;background:#fff;cursor:pointer;user-select:none;transition:all .2s}
.excard
.excard
.ring{display:flex;flex-direction:column;align-items:center;gap:3px}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid #DDD;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;transition:all .2s}
.chk.on{border-color:var(--green);background:var(--green)}
.fade{animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:0;height:0}

@media (prefers-color-scheme: dark) {
  :root {
    --teal:#26A69A;--lt-teal:#1A3D3A;--gold:#FFB300;--lt-gold:#2D2200;

  .stab:not(.on) { background:#2A2A2A; color:#999; }

  .meal-hdr { background:#252525; border-color:#333; }

  .chk { background:#2A2A2A; border-color:#444; }

  .badge-red   { background:#2D1515; color:#EF5350; }
  .badge-gold  { background:#2D2200; color:#FFB300; }
  .badge-teal  { background:var(--lt-teal); color:var(--teal); }

  [style*="background:#fff"],[style*="background: #fff"],
  [style*="background:#FAFAFA"],[style*="background:#F5F5F5"],
  [style*="background:#F9F9F9"],[style*="background:#FAFFFE"],
  [style*="background:#F8FFFE"] { background:#252525 !important; }
  [style*="background:#F0F0F0"] { background:#2A2A2A !important; }
  [style*="background:#F4F7F6"] { background:#0F0F0F !important; }

  /* Light pastel backgrounds → dark equivalents */
  [style*="background:#E8F5E9"] { background:#1A3320 !important; }
  [style*="background:#FFEBEE"] { background:#2D1515 !important; }
  [style*="background:#FFF8E1"] { background:#2D2200 !important; }
  [style*="background:#E3F2FD"] { background:#0D2033 !important; }
  [style*="background:#EDE7F6"] { background:#1E1528 !important; }
  [style*="background:#F0FAF8"] { background:#0D2520 !important; }

  /* Text colours */
  [style*="color:#555"],[style*="color: #555"],
  [style*="color:#666"],[style*="color: #666"] { color:#AAA !important; }
  [style*="color:#888"],[style*="color: #888"] { color:#888 !important; }
  [style*="color:#333"],[style*="color: #333"] { color:#CCC !important; }
  [style*="color:var(--dark)"] { color:#E8EAF6 !important; }

  /* Border colours */
  [style*="border-bottom:1px solid #F5F5F5"] { border-bottom-color:#2A2A2A !important; }
  [style*="border-bottom:1px solid #EEE"] { border-bottom-color:#333 !important; }
  [style*="border:1px solid #EEE"] { border-color:#333 !important; }
  [style*="border:1.5px solid #E8F0EE"] { border-color:#333 !important; }
  [style*="border:1px solid #DDD"] { border-color:#444 !important; }

  /* Undo bar */
  #undo-bar { background:#333 !important; }

  /* Input number spinners */
  input[type="number"] { color-scheme: dark; }
}

@media (prefers-color-scheme: dark) {
  /* SVG chart text */
  svg text { fill:#AAA !important; }

  /* Tab bar bottom nav */
  .nav { background:#1A1A1A !important; border-top-color:#333 !important; }
  .nav button { color:#888 !important; }
  .nav button.on { color:var(--teal) !important; }

  /* Circuit timer overlay */
  #circuit-overlay { background:#0F0F0F !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:#1A1A1A; }
  ::-webkit-scrollbar-thumb { background:#444; border-radius:4px; }

  /* White text on dark teal header — stays as-is, already works */
  .hdr { background:linear-gradient(135deg,#0A0A1A 0%,#00695C 100%) !important; }

  [style*="background:#FFEBEE;border:1px solid #EF9A9A"] { background:#2D1515 !important; border-color:#661515 !important; }

  [style*="background:linear-gradient(135deg,#E8F5E9"] { background:linear-gradient(135deg,#1A3320,#1E3A20) !important; border-color:var(--green) !important; }

  [style*="background:#F0F0F0;border-radius:20px"] { background:#2A2A2A !important; }

}
</style>

let FOOD_DB = [];
async function loadFoodDB() {
  try {
    const res = await fetch('foods.json');
    if (!res.ok) throw new Error('foods.json not found');
    FOOD_DB = await res.json();
    // Also re-load any custom foods saved by user
    LS.get('custom_foods',[]).forEach(f => { if(!FOOD_DB.find(x=>x.name===f.name)) FOOD_DB.push(f); });
  } catch(e) {
    console.warn('foods.json load failed, using empty DB:', e.message);
  }
}

/** Quick lookup by partial name (case-insensitive) */
const searchFoods = (query, db = FOOD_DB) => {
  if (!query?.trim()) return db;
  const q = query.toLowerCase();
  return db.filter(f => f.name.toLowerCase().includes(q));
};

  const keys = Object.keys(WEEK_PROTOCOLS).map(Number).sort((a,b)=>b-a);

const TRIP_START = "2025-03-29";
const TRIP_END   = "2025-04-02";

/** Returns active programme days (excluding trip break) */
const getActiveDays = (startDateStr) => {
  if (!startDateStr) return 0;
  const start = new Date(startDateStr); start.setHours(0, 0, 0, 0);
  const now   = new Date();             now.setHours(0, 0, 0, 0);
  if (now < start) return 0;
  const rawDiff = Math.floor((now - start) / 86400000);
  const tripS = new Date(TRIP_START); tripS.setHours(0, 0, 0, 0);
  const tripE = new Date(TRIP_END);   tripE.setHours(0, 0, 0, 0);
  let tripDays = 0;
  if (now > tripS) {
    const overlapEnd = now < tripE ? now : tripE;
    tripDays = Math.max(0, Math.floor((overlapEnd - tripS) / 86400000));
  }
  return Math.max(0, rawDiff - tripDays);
};

const getPhase = (startDateStr) => {
  const week = Math.floor(getActiveDays(startDateStr) / 7) + 1;
  if (week <= 4) return 1;
  if (week <= 8) return 2;
  return 3;
};

const getPhaseWeek = (startDateStr) =>
  Math.min(Math.floor(getActiveDays(startDateStr) / 7) + 1, 12);

const isTripDay = () => {
  const now = new Date(); now.setHours(0, 0, 0, 0);
  const ts  = new Date(TRIP_START); ts.setHours(0, 0, 0, 0);
  const te  = new Date(TRIP_END);   te.setHours(0, 0, 0, 0);
  return now >= ts && now <= te;
};

// Cross-midnight fast carry-over
// If yesterday's fast was still running when midnight passed, continue it today
function carryFastOverMidnight() {
  const today = isoToday();
  const yesterday = isoTomorrow(); // reuse helper but go back
  // Get yesterday's date string
  const yd = new Date(); yd.setDate(yd.getDate()-1);
  const yStr = yd.getFullYear()+'-'+String(yd.getMonth()+1).padStart(2,'0')+'-'+String(yd.getDate()).padStart(2,'0');

  const yDay = LS.get('hlog_'+yStr, null);
  if(!yDay) return null;

  // Yesterday's fast was still active (never stopped)
  if(yDay.fasting && yDay.fastStart) {
    const elapsed = Math.floor((Date.now() - yDay.fastStart) / 1000);
    // Only carry over if it's a plausible fast (started within last 24h)
    if(elapsed > 0 && elapsed < 48*3600) {
      // Mark yesterday's fast as ended at midnight
      const midnight = new Date(today+'T00:00:00').getTime();
      const ySecs = Math.floor((midnight - yDay.fastStart) / 1000);
      yDay.fastBest = Math.max(yDay.fastBest||0, ySecs);
      yDay.fasting = false;
      yDay.fastStart = null;
      saveDay(yStr, yDay);

      // Return a today day-object with fast already running from original start
      const todayDay = loadDay(today);
      todayDay.fasting = true;
      todayDay.fastStart = yDay.fastStart || (Date.now() - elapsed*1000);
      return todayDay;
    }
  }
  return null;
}

const FB_KEY = 'fb_config';
let fbApp=null, fbDb=null, fbUser=null, fbSyncing=false;

function fbConfig() { return LS.get(FB_KEY, null); }

async function fbInit(cfg) {
  if(!cfg) return;
  try {
    const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getDatabase, ref, set, get, onValue } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const { getAuth, signInAnonymously, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');

    const existing = getApps();
    fbApp = existing.length ? existing[0] : initializeApp(cfg);
    fbDb = getDatabase(fbApp);
    const auth = getAuth(fbApp);

    await signInAnonymously(auth);
    onAuthStateChanged(auth, async user => {
      if(user) {
        fbUser = user.uid;
        LS.set('fb_uid', fbUser);
        await fbPull();
        fbWatch();
      }
    });
  } catch(e) { console.warn('Firebase init failed:', e.message); }
}

async function fbPush() {
  if(!fbDb||!fbUser||fbSyncing) return;
  try {
    const { ref, set } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const data = {
      prog_start: S.startDate||'',
      diet_mode: S.diet||'keto',
      history: LS.get('hlog_history',[]),
      today: S.day,
      today_date: S.date,
      done_ex: S.doneEx,
      updated: Date.now()
    };
    // Also save last 90 days of daily logs
    const logs = {};
    const hist = LS.get('hlog_history',[]);
    hist.forEach(h => { const d = LS.get('hlog_'+h.date,null); if(d) logs[h.date.replace(/-/g,'_')]=d; });
    data.logs = logs;
    await set(ref(fbDb, 'users/'+fbUser), data);
    showSyncBadge('✓');
  } catch(e) { showSyncBadge('⚠'); }
}

async function fbPull() {
  if(!fbDb||!fbUser) return;
  try {
    fbSyncing = true;
    const { ref, get } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const snap = await get(ref(fbDb, 'users/'+fbUser));
    if(snap.exists()) {
      const data = snap.val();
      // Only restore if cloud is newer or local has no start date
      if(data.prog_start && !S.startDate) {
        S.startDate = data.prog_start;

function calcMacros(profile) {
  const { age, heightCm, currentWeight, goalWeight, gender, activityLevel, conditions, medications, dietMode } = profile;
  const w = currentWeight || 80, h = heightCm || 170, a = age || 35;

  // -- BMI & Adjusted Body Weight (ABW) --
  // For BMI >30, using actual weight in BMR overestimates metabolic rate.
  // ABW = IBW + 0.4 * (actual - IBW) is the clinical standard for obese dosing.
  const bmi = w / ((h/100)**2);
  const hIn = h / 2.54;
  const ibw = (gender === 'female' ? 45.5 : 50) + 2.3 * Math.max(0, hIn - 60);
  const abw = bmi > 30 ? ibw + 0.4*(w - ibw) : w;

  // -- BMR via Mifflin-St Jeor using ABW --
  const bmr = gender === 'female'
    ? 10*abw + 6.25*h - 5*a - 161
    : 10*abw + 6.25*h - 5*a + 5;

  // -- Activity multiplier (conservative for high BMI) --
  const multMap = { sedentary:1.2, light:1.3, moderate:1.45, active:1.6 };
  const mult = bmi > 35
    ? Math.min(1.3, multMap[activityLevel]||1.3)
    : (multMap[activityLevel]||1.3);
  const tdee = Math.round(bmr * mult);

  // -- Calorie target --
  // Deficit scales with BMI (higher BMI = safer to cut more)
  let deficit = bmi > 35 ? 650 : bmi > 30 ? 500 : 350;
  let cal = tdee - deficit;

  // Ozempic: clinical data shows patients eat ~30-35% less than TDEE.
  // Apply as intake cap (not additional deficit — avoid double-counting).
  if(medications.includes('ozempic')) cal = Math.min(cal, Math.round(tdee * 0.65));

  // Floor: preserve metabolic rate & adherence
  const calFloor = gender === 'female' ? 1200 : 1300;
  cal = Math.max(calFloor, cal);
  cal = Math.round(cal / 50) * 50;

  // -- Protein: 1.2g/kg ABW (preserve muscle during loss, realistic to achieve) --
  let protein = Math.round(abw * 1.2);
  // Saroglitazar/NAFLD: slightly higher protein supports liver
  if(medications.includes('saroglitazar')) protein += 5;
  protein = Math.min(130, Math.max(90, protein));

  // -- Carbs --
  let carbs = dietMode === 'keto' ? 22 : 45;
  if(conditions.includes('diabetes')) carbs = Math.min(30, carbs);
  if(conditions.includes('pcos') && carbs > 35) carbs = 35;

  // -- Fat: fill remaining; keto needs min 70g to sustain ketosis --
  let fat = Math.round((cal - protein*4 - carbs*4) / 9);
  fat = Math.max(dietMode === 'keto' ? 70 : 45, fat);

  // -- Final calories from actual macros --
  const finalCal = Math.round(protein*4 + carbs*4 + fat*9);

  return { protein, carbs, fat, cal: finalCal, tdee, bmi: +bmi.toFixed(1) };
}

function startCircuitTimer() {
  stopCircuitTimer();
  S.circuit.timerId = setInterval(() => {
    if(S.circuit.phase === 'rest') {
      S.circuit.restSecs--;
      if(S.circuit.restSecs <= 0) {
        // Rest over — start next round
        S.circuit.phase = 'exercise';
        S.circuit.exIdx = 0;
        const ex = circuitExList()[S.circuit.exIdx];
        if(ex && TIMED_EX[ex.name]) {
          S.circuit.timerSecs = TIMED_EX[ex.name];
        } else {
          S.circuit.timerSecs = 0;
        }
        stopCircuitTimer();
        render();
        return;
      }
    } else if(S.circuit.timerSecs > 0) {
      S.circuit.timerSecs--;
      if(S.circuit.timerSecs <= 0) {
        // Timed exercise done — advance
        circuitNext();
        return;
      }
    }
    // Update timer display only (lightweight)
    const el = document.getElementById('circuit-timer');
    if(el) {
      if(S.circuit.phase === 'rest') {
        el.textContent = fmtSecs(S.circuit.restSecs);
      } else if(S.circuit.timerSecs > 0) {
        el.textContent = fmtSecs(S.circuit.timerSecs);
      }
    }
  }, 1000);
}

function stopCircuitTimer() {
  if(S.circuit.timerId) { clearInterval(S.circuit.timerId); S.circuit.timerId = null; }
}

function fmtSecs(s) {
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function circuitNext() {
  stopCircuitTimer();
  const exList = circuitExList();
  // Mark current exercise as done
  const curEx = exList[S.circuit.exIdx];
  if(curEx && !S.doneEx.includes(curEx.name)) {
    S.doneEx.push(curEx.name);
    LS.set('done_ex_' + S.date, S.doneEx);
  }
  const nextIdx = S.circuit.exIdx + 1;
  if(nextIdx >= exList.length) {
    // Round complete
    if(S.circuit.round >= CIRCUIT_TOTAL_ROUNDS) {
      // All done!
      S.circuit.active = false;
      persist(); render(); return;
    }
    // Start rest between rounds
    S.circuit.phase = 'rest';
    S.circuit.restSecs = REST_BETWEEN_ROUNDS;
    S.circuit.round++;
    // Clear done list for new round tracking (but keep logged)
    startCircuitTimer();
    render(); return;
  }
  // Next exercise in round
  S.circuit.exIdx = nextIdx;
  S.circuit.phase = 'exercise';
  const nextEx = exList[nextIdx];
  if(nextEx && TIMED_EX[nextEx.name]) {
    S.circuit.timerSecs = TIMED_EX[nextEx.name];
    startCircuitTimer();
  } else {
    S.circuit.timerSecs = 0;
  }
  render();
}

// S.day.fasting    = bool, is timer running right now
// S.day.fastStart  = Date.now() of current session start
// S.day.fastBest   = best continuous seconds achieved today (saved on stop)
// S.fastElapsed    = live seconds of current session (display only)

function startTimer() {
  if(S.fastTimer) clearInterval(S.fastTimer);
  if(S.day.fasting && S.day.fastStart) {
    S.fastTimer = setInterval(()=>{
      S.fastElapsed = Math.floor((Date.now()-S.day.fastStart)/1000);
      tickTimer();
    },1000);
  }
}
function tickTimer() {
  const el=document.getElementById('ft'); const arc=document.getElementById('fa');
  if(!el||!arc) return;
  const R=85, C=2*Math.PI*R, pct=Math.min(S.fastElapsed/3600/19,1);
  el.textContent=hms(S.fastElapsed);
  arc.setAttribute('stroke-dashoffset',C*(1-pct));
  arc.setAttribute('stroke',pct>=1?'#66BB6A':'var(--teal)');
}
function toggleFast() {
  if(S.day.fasting) {
    // Stop — save this session as best if it's the longest
    const sessionSecs = Math.floor((Date.now()-S.day.fastStart)/1000);
    S.day.fastBest = Math.max(S.day.fastBest||0, sessionSecs);
    S.day.fasting = false;
    S.day.fastStart = null;
    S.fastElapsed = 0;
    if(S.fastTimer){ clearInterval(S.fastTimer); S.fastTimer=null; }
  } else {
    // Start fresh session — reset elapsed, keep best
    S.day.fasting = true;
    S.day.fastStart = Date.now();
    S.fastElapsed = 0;
    startTimer();
  }
  persist(); render();
}
function resetFast() {
  if(!confirm('Reset all fasting data for today?')) return;
  S.day.fasting=false; S.day.fastStart=null; S.day.fastBest=0; S.fastElapsed=0;
  if(S.fastTimer){ clearInterval(S.fastTimer); S.fastTimer=null; }
  persist(); render();
}

  if(S.day.fasting && S.day.fastStart) {
    const sessionSecs = Math.floor((Date.now()-S.day.fastStart)/1000);
    S.day.fastBest = Math.max(S.day.fastBest||0, sessionSecs);
    if(S.fastTimer){ clearInterval(S.fastTimer); S.fastTimer=null; }
  }
  S.day.fasting = true;
  S.day.fastStart = lastTs; // Start from last food ts
  S.fastElapsed = Math.floor((Date.now() - lastTs) / 1000);
  startTimer();
  persist(); render();
}

function addFood(food,qty) {
  const sc=scale(food,qty); sc.cal=sc.cal||kcal(sc);
  // Use manually entered time if set, otherwise now
  let ts = Date.now();
  if(S.logTime) {
    const [hh,mm] = S.logTime.split(':').map(Number);
    const d = new Date(); d.setHours(hh, mm, 0, 0);
    // If entered time is in the future (e.g. logging yesterday evening), step back
    if(d.getTime() > Date.now()) d.setDate(d.getDate()-1);
    ts = d.getTime();
  }
  S.day.entries.push({id:Date.now(),name:food.name,qty,...sc,ts});
  // Auto-stop fast if food is caloric (>=20 kcal) and fast is running
  if((sc.cal||0) >= 20 && S.day.fasting && S.day.fastStart) {
    const sessionSecs = Math.floor((ts - S.day.fastStart) / 1000);
    if(sessionSecs > 0) S.day.fastBest = Math.max(S.day.fastBest||0, sessionSecs);
    S.day.fasting = false;
    S.day.fastStart = null;
    S.fastElapsed = 0;
    if(S.fastTimer){ clearInterval(S.fastTimer); S.fastTimer=null; }
  }
  S.sel=null; S.srch=''; S.qty=1; S.logTime=''; persist(); render();
}

// Build a plan object with any swapped meals applied
function effectivePlanObj(isTmr=false) {
  const p = isTmr ? tmrPlan() : todayPlan();
  const m0 = isTmr ? (S.tmrSwappedM0 || p.meals?.[0]) : (S.swappedM0 || p.meals?.[0]);
  const m1 = isTmr ? (S.tmrSwappedM1 || p.meals?.[1]) : (S.swappedM1 || p.meals?.[1]);
  const meals = [m0, m1].filter(Boolean);
  // Rebuild grocery — strip quantity prefixes, deduplicate by ingredient, aggregate qtys
  const map = new Map();
  const stripQty = str => str
    .replace(/^\d[\d½¼¾\/\s]*\s*(ग्राम|gram|g|tsp|tbsp|छोटे?\s*चम्मच|टेबलस्पून|पूरे|whole|slice|ml|kg)\s*/i,'')
    .replace(/^(छोटे?\s*चम्मच|टेबलस्पून|ग्राम)\s*/i,'')
    .replace(/^\d+\s*/,'')
    .replace(/\s*—\s*(क्यूब्स|cubes|कद्दूकस|grated|साइड.*|for the.*|optional|वैकल्पिक.*)$/i,'')
    .replace(/\(.*?\)/g,'')
    .trim();

  meals.forEach(m => (m.ingredients||[]).forEach(i => {
    const key = stripQty(i.en).toLowerCase();
    const cleanHi = stripQty(i.hi);
    const cleanEn = stripQty(i.en);
    if(map.has(key)) {
      const prev = map.get(key);
      const prevNum = parseFloat(prev.qty);
      const curNum  = parseFloat(i.qty);
      if(!isNaN(prevNum) && !isNaN(curNum)) {
        const unit = (i.qty+'').replace(/^[\d.]+\s*/,'').trim();
        map.set(key, { ...prev, qty: (prevNum+curNum) + (unit ? ' '+unit : '') });
      }
    } else {
      map.set(key, { hi: cleanHi, en: cleanEn, qty: i.qty });
    }
  }));
  const grocery = Array.from(map.values());
  const totals = {
    protein: meals.reduce((a,m)=>a+(m.protein||0),0),
    carbs:   meals.reduce((a,m)=>a+(m.carbs||0),0),
    fat:     meals.reduce((a,m)=>a+(m.fat||0),0),
    cal:     meals.reduce((a,m)=>a+(m.cal||0),0),
  };
  return { ...p, meals, grocery, totals };
}

function openWA(text) {
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function copyText(text, flagKey) {
  // Try modern clipboard API first, fallback to textarea trick
  const finish = () => { S[flagKey]=true; render(); setTimeout(()=>{S[flagKey]=false;render();},2500); };
  if(navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(finish).catch(() => {
      fallbackCopy(text); finish();
    });
  } else {
    fallbackCopy(text); finish();
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function genGroceryWA(p) {
  let t = `🛒 सब्ज़ी / किराना लिस्ट — ${p.day}\n\n`;

}

function genCookingWA(p) {
  let t = `🍳 कल का खाना — ${p.day}\n`;
  t += `${p.theme}\n\n`;
  t += `⏰ खाने का समय: दोपहर 2 बजे से शाम 7 बजे तक (2 PM – 7 PM only)\n\n`;
  (p.meals||[]).forEach((m, mi) => {
    t += `🍽 खाना ${mi+1} — ${m.time}\n`;
    t += `${m.name}\n\n`;
    if(m.ingredients?.length) {
      t += `सामग्री:\n`;
      m.ingredients.forEach(i => { t += `  • ${i.hi} — ${i.qty}\n`; });
      t += '\n';
    }
    if(m.steps?.length) {
      t += `तरीका:\n`;
      m.steps.forEach((s, si) => { t += `  ${si+1}. ${s.hi}\n     ${s.en}\n`; });
    }
    t += '\n';
  });
  t += `⚠️ ज़रूरी:\n`;
  t += `❌ तेल नहीं — सिर्फ घी/मक्खन\n`;
  if(S.diet==='keto') t += `❌ चावल, रोटी, दाल नहीं\n`;

  t += `Nutrition: Protein ~${p.totals.protein}g, Carbs ~${p.totals.carbs}g, Cal ~${p.totals.cal} kcal`;
  return t;
}

async function nixSearch(q) {
  // USDA FoodData Central — free, no API key needed
  S.nixSearching = true; S.nixResults = []; repaintList();
  try {
    const url = 'https://api.nal.usda.gov/fdc/v1/foods/search?query='
      + encodeURIComponent(q)
      + '&pageSize=15&api_key=DEMO_KEY';
    const res = await fetch(url);
    if(res.status === 429) { alert('USDA rate limit reached (30 searches/hour free). Try again in a few minutes.'); S.nixSearching=false; repaintList(); return; }
    if(!res.ok) { alert('USDA search error: ' + res.status + '. Check internet connection.'); S.nixSearching=false; repaintList(); return; }
    const data = await res.json();
    const hits = (data.foods || []).slice(0, 12);
    if(hits.length===0) { alert('No results found for "'+q+'" in USDA database. Try a simpler term.'); S.nixSearching=false; repaintList(); return; }
    S.nixResults = hits.map(h => {
      const get = (n) => {
        const nut = (h.foodNutrients||[]).find(x => x.nutrientName === n);
        return nut ? +nut.value.toFixed(1) : 0;
      };
      const p   = get('Protein');
      const c   = +(Math.max(0, get('Carbohydrate, by difference') - get('Fiber, total dietary'))).toFixed(1);
      const f   = get('Total lipid (fat)');
      const cal = Math.round(get('Energy')) || Math.round(p*4 + c*4 + f*9);
      const srv = h.servingSize ? ' ('+h.servingSize+(h.servingSizeUnit||'g')+')' : ' (100g)';
      return {
        name: (h.description||'').slice(0,60) + srv,
        protein: p, carbs: c, fat: f, cal,
        category: 'USDA'
      };
    }).filter(f => f.cal > 0);
  } catch(e) {
    S.nixResults = [];
    alert('USDA search failed — ' + e.message + '. Check internet connection.');
  }
  S.nixSearching = false; repaintList();
}

    </div>`;
  }).join('');

function pickFood(name, fromNix) {
  let f;
  if(fromNix) {
    f = S.nixResults.find(x=>x.name===name);
  } else {
    const all = [...FOOD_DB, ...(LS.get('custom_foods',[]))];
    f = all.find(x=>x.name===name);

  if(!f) return;
  S.sel = S.sel?.name===name ? null : f; S.qty=1;
  repaintList();
}

function fastHistoryCard() {
  const days = [];
  for(let i=1; i<=14; i++) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const dayObj = LS.get('hlog_'+ds, null);
    const histObj = (S.hist||[]).find(h=>h.date===ds);
    const fb = dayObj?.fastBest || histObj?.fastBest || 0;
    if(fb > 0 || i <= 7) days.push({ date:ds, fastBest:fb });
  }
  days.reverse();
  const chartDays = days.slice(-7);
  const yday = days[days.length-2];
  const yFast = yday?.fastBest || 0;
  const yHrs = (yFast/3600).toFixed(1);
  const yReached = yFast >= 19*3600;
  const withData = days.filter(d=>d.fastBest>0);
  const avg7 = withData.length ? withData.reduce((a,d)=>a+d.fastBest,0)/withData.length : 0;
  const avg7h = (avg7/3600).toFixed(1);

  const ybg  = yFast>0 ? (yReached?'#E8F5E9':'var(--lt-teal)') : '#F5F5F5';
  const ybd  = yFast>0 ? (yReached?'#A5D6A7':'#B2DFDB') : '#EEE';
  const ycol = yFast>0 ? (yReached?'var(--green)':'var(--teal)') : '#CCC';
  const ysub = yReached ? '<div style="font-size:10px;color:var(--green)">✓ Target met</div>'
             : yFast>0  ? '<div style="font-size:10px;color:var(--muted)">Target: 19h</div>'
                        : '<div style="font-size:10px;color:#CCC">No data</div>';

  let out = '<div style="display:flex;gap:10px;margin-bottom:16px">';
  out += '<div style="flex:1;padding:12px;background:'+ybg+';border-radius:12px;border:1px solid '+ybd+'">';
  out += '<div style="font-size:10px;color:#888;margin-bottom:4px">Yesterday</div>';
  out += '<div style="font-size:20px;font-weight:700;color:'+ycol+'">'+(yFast>0?yHrs+'h':'—')+'</div>'+ysub+'</div>';
  out += '<div style="flex:1;padding:12px;background:'+(avg7>0?'var(--lt-teal)':'#F5F5F5')+';border-radius:12px;border:1px solid '+(avg7>0?'#B2DFDB':'#EEE')+'">';
  out += '<div style="font-size:10px;color:#888;margin-bottom:4px">7-day avg</div>';
  out += '<div style="font-size:20px;font-weight:700;color:'+(avg7>0?'var(--teal)':'#CCC')+'">'+(avg7>0?avg7h+'h':'—')+'</div>';
  out += '<div style="font-size:10px;color:var(--muted)">'+withData.length+' day'+(withData.length!==1?'s':'')+' tracked</div></div></div>';

  if(chartDays.some(d=>d.fastBest>0)) {
    const maxSecs = Math.max(...chartDays.map(d=>d.fastBest), 19*3600);
    out += '<div style="font-size:11px;color:var(--muted);margin-bottom:8px">Last 7 days</div>';
    out += '<div style="display:flex;gap:4px;align-items:flex-end;height:80px;margin-bottom:6px">';
    chartDays.forEach(d => {
      const h = (d.fastBest/3600).toFixed(1);
      const pct = d.fastBest ? Math.round(d.fastBest/maxSecs*100) : 0;
      const col = d.fastBest >= 19*3600 ? 'var(--green)' : d.fastBest >= 16*3600 ? 'var(--teal)' : d.fastBest >= 12*3600 ? 'var(--gold)' : d.fastBest>0 ? '#E53935' : '#EEE';
      const dayLbl = new Date(d.date+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short'});
      out += '<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1">';
      out += '<div style="font-size:8px;color:var(--muted)">'+(d.fastBest?h+'h':'')+'</div>';
      out += '<div style="width:100%;height:'+pct+'%;min-height:'+(d.fastBest?3:0)+'px;background:'+col+';border-radius:3px 3px 0 0"></div>';
      out += '<div style="font-size:8px;color:var(--muted)">'+dayLbl+'</div></div>';
    });
    out += '</div>';
    out += '<div style="display:flex;gap:10px;flex-wrap:wrap">';
    out += '<span style="font-size:10px;color:#888">🟢 ≥19h &nbsp; 🔵 ≥16h &nbsp; 🟡 ≥12h &nbsp; 🔴 &lt;12h</span>';
    out += '</div>';
  } else {
    out += '<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">No fasting history yet — data builds up over time</div>';
  }
  return out;
}

const LFT_TESTS = [
  { id:'lft',  label:'🩸 LFT (Liver Function Test)', reason:'Saroglitazar monitoring', freq:90 },
  { id:'lipid',label:'🩸 Lipid Profile',              reason:'Cholesterol + triglycerides on keto', freq:90 },
  { id:'hba1c',label:'🩸 HbA1c',                      reason:'Blood sugar trend — Ozempic efficacy', freq:90 },
  { id:'rft',  label:'🩸 RFT (Kidney Function)',       reason:'Olmesartan monitoring', freq:90 },
  { id:'vitd', label:'🩸 Vitamin D3 Level',            reason:'Supplement dose calibration', freq:180 },
  { id:'b12',  label:'🩸 Vitamin B12 Level',           reason:'Supplement dose calibration', freq:180 },
];

function getLastTest(id)  { return LS.get('lft_last_'+id, null); }
function logTest(id) {
  if(!confirm('Mark this test as done today?')) return;
  LS.set('lft_last_'+id, Date.now());
  render();
}
function clearTest(id) {
  if(!confirm('Clear this test date?')) return;
  LS.set('lft_last_'+id, null);
  render();
}
function daysSinceTs(ts) { return ts ? Math.floor((Date.now()-ts)/86400000) : null; }
function daysUntil(ts, freq) {
  if(!ts) return 0;
  return Math.max(0, freq - Math.floor((Date.now()-ts)/86400000));
}

function lftCard() {
  const overdue = LFT_TESTS.filter(t => {
    const last = getLastTest(t.id);
    return !last || daysSinceTs(last) >= t.freq;
  });

  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="sec" style="margin:0">🧪 Blood Tests</div>
      ${overdue.length>0?`<div style="background:var(--red);color:#fff;border-radius:12px;padding:3px 10px;font-size:11px;font-weight:700">${overdue.length} due</div>`:'<div style="background:var(--green);color:#fff;border-radius:12px;padding:3px 10px;font-size:11px;font-weight:700">All up to date ✓</div>'}
    </div>
    <div style="font-size:11px;color:#888;margin-bottom:14px">Tap ✓ Done when you've had the test</div>
    ${LFT_TESTS.map(t => {
      const last = getLastTest(t.id);
      const days = daysSinceTs(last);
      const left = daysUntil(last, t.freq);
      const isDue = !last || days >= t.freq;
      const isSoon = !isDue && left <= 14;
      const statusColor = isDue ? 'var(--red)' : isSoon ? 'var(--gold)' : 'var(--green)';
      const statusText = !last ? 'Never done' : isDue ? `Overdue — ${days}d ago` : isSoon ? `Due in ${left} days` : `Due in ${left} days`;
      const lastText = last ? `Last: ${new Date(last).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}` : '';
      return `<div style="padding:11px 0;border-bottom:1px solid #F5F5F5">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;color:var(--dark)">${t.label}</div>
            <div style="font-size:11px;color:#888;margin-top:1px">${t.reason}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
              <span style="font-size:11px;font-weight:700;color:${statusColor}">${statusText}</span>
              ${lastText?`<span style="font-size:10px;color:#BBB">${lastText}</span>`:''}
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button onclick="logTest('${t.id}')" style="padding:6px 12px;background:${isDue?'var(--green)':'#E8F5E9'};color:${isDue?'#fff':'var(--green)'};border:none;border-radius:8px;font-size:12px;font-weight:700">✓ Done</button>
            ${last?`<button onclick="clearTest('${t.id}')" style="padding:6px 8px;background:#FFEBEE;color:var(--red);border:none;border-radius:8px;font-size:11px">✕</button>`:''}
          </div>
        </div>
        ${!isDue?`<div style="margin-top:6px;height:4px;background:#EEE;border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${Math.min(100,Math.round((t.freq-left)/t.freq*100))}%;background:${isSoon?'var(--gold)':'var(--teal)'};border-radius:2px"></div>
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

// --- ANALYTICS HELPERS -------------------------------------------

function movingAvg(hist, n=7) {
  // 7-day moving average of weight from history (oldest first)
  const weighted = hist.filter(d => d.weight).slice(0, 30).reverse();
  if(weighted.length < 2) return [];
  return weighted.map((d, i) => {
    const window = weighted.slice(Math.max(0, i-n+1), i+1).filter(x=>x.weight);
    const avg = window.reduce((s,x)=>s+x.weight,0)/window.length;
    return { date: d.date, avg: +avg.toFixed(2) };
  });
}

function analyticsData(hist) {
  // Compute all metabolic analytics from history
  const wData = hist.filter(d => d.weight).slice(0, 30).reverse(); // oldest→newest
  if(wData.length < 3) return null;

  const latest = wData[wData.length-1].weight;
  const oldest = wData[0].weight;
  const daySpan = wData.length;
  const totalLost = oldest - latest;
  const ratePerDay = totalLost / Math.max(daySpan-1, 1); // kg/day
  const ratePerWeek = ratePerDay * 7;

  // 7700 kcal = 1kg fat rule
  const deficitPerDay = Math.round(ratePerDay * 7700);

  // Calorie data for maintenance estimate
  const calDays = hist.filter(d=>d.cal>0).slice(0,14);
  const avgCal = calDays.length ? Math.round(calDays.reduce((s,d)=>s+d.cal,0)/calDays.length) : 0;
  // Maintenance = avg intake + deficit
  const maintenance = avgCal > 0 ? Math.round(avgCal + deficitPerDay) : 0;

  // Goal prediction
  const goalW = LS.get('goal_weight', 80);
  const remaining = Math.max(0, latest - goalW);
  const daysToGoal = ratePerDay > 0.001 ? Math.round(remaining / ratePerDay) : null;
  let goalDateStr = null;
  if(daysToGoal !== null) {
    const gd = new Date(); gd.setDate(gd.getDate() + daysToGoal);
    goalDateStr = gd.toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
  }

  // Status assessment
  let status, statusColor, statusMsg;
  const absRate = Math.abs(ratePerWeek);
  if(totalLost <= 0) {
    status = '⚠️ Stalled'; statusColor = '#F57F17';
    statusMsg = 'Weight not moving. Check portion sizes and reduce carbs.';
  } else if(absRate > 1.5 && wData.length >= 14) {
    status = '⚡ Too Fast'; statusColor = '#C62828';
    statusMsg = `Losing ${ratePerWeek.toFixed(2)}kg/week. Increase calories by ~200 to protect muscle.`;
  } else if(absRate > 1.5 && wData.length < 14) {
    status = '💧 Water Weight'; statusColor = '#1565C0';
    statusMsg = `Early loss of ${ratePerWeek.toFixed(2)}kg/week is normal — mostly water from keto. Re-assessed after 2 weeks.`;
  } else if(absRate >= 0.3 && absRate <= 1.0) {
    status = '✅ On Track'; statusColor = '#2E7D32';
    statusMsg = `Steady loss of ${ratePerWeek.toFixed(2)}kg/week. Keep going.`;
  } else if(absRate > 1.0 && absRate <= 1.5) {
    status = '✅ Good Pace'; statusColor = '#1565C0';
    statusMsg = `${ratePerWeek.toFixed(2)}kg/week — excellent, sustainable rate.`;
  } else {
    status = '🐌 Slow'; statusColor = '#F57F17';
    statusMsg = `Only ${ratePerWeek.toFixed(2)}kg/week. Tighten carbs or add fasted walk.`;
  }

  return { latest, oldest, totalLost, ratePerDay, ratePerWeek, deficitPerDay,
           avgCal, maintenance, goalW, remaining, daysToGoal, goalDateStr,
           status, statusColor, statusMsg, wDataLen: wData.length };
}

function loggingStreak(hist) {
  // Consecutive days (today backward) with at least 1 food logged
  if(!hist.length) return 0;
  let streak = 0;
  const today = isoToday();
  // hist is newest-first
  for(let i = 0; i < hist.length; i++) {
    const d = hist[i];
    // Allow today to count even if cal=0 (still in progress)
    if(i === 0 && d.date === today) { streak++; continue; }
    if(d.cal > 0 || d.protein > 0) streak++;
    else break;
  }
  return streak;
}

function dayComplete(dayData) {
  // 90–110% calories AND >=80% protein target
  if(!dayData) return false;
  const tg = tgt();
  const t = sumMacros(dayData.entries || []);
  const calOk = t.cal >= tg.cal * 0.9 && t.cal <= tg.cal * 1.15;
  const protOk = t.protein >= tg.protein * 0.8;
  return calOk && protOk;
}

function exportCSV() {
  const h = S.hist;
  if(!h.length) { alert('No history to export yet.'); return; }
  const rows = [['Date','Protein(g)','Carbs(g)','Fat(g)','Calories','Weight(kg)','Water(L)','Fasting(h)','Workout']];
  h.forEach(d => {
    const fast = d.fastBest ? (d.fastBest/3600).toFixed(1) : '';
    rows.push([d.date, Math.round(d.protein||0), Math.round(d.carbs||0), Math.round(d.fat||0),
      Math.round(d.cal||0), d.weight||'', d.water||'', fast, d.workoutDone?'Yes':'No']);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nytyn_health_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function metabolicCard(hist) {
  const a = analyticsData(hist);
  const startW = LS.get('start_weight', 116);
  const goalW  = LS.get('goal_weight', 80);
  // Use earliest logged weight as start, latest as current
  const weightEntries = hist.filter(d=>d.weight).sort((a,b)=>a.date.localeCompare(b.date));
  const firstLoggedW = weightEntries.length ? weightEntries[0].weight : startW;
  const currentW = weightEntries.length ? weightEntries[weightEntries.length-1].weight : startW;
  const effectiveStart = Math.max(firstLoggedW, startW - 0.5); // use logged if close to setting
  const totalJourney = effectiveStart - goalW;
  const doneSoFar = effectiveStart - currentW;
  const pct = totalJourney > 0 ? Math.min(100, Math.round(doneSoFar / totalJourney * 100)) : 0;

  // Progress bar always shows even without enough data
  const progressBar = `
    <div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:12px;font-weight:700;color:var(--dark)">Goal Progress</span>
        <span style="font-size:12px;font-weight:700;color:var(--teal)">${pct}%</span>
      </div>
      <div style="background:#F0F0F0;border-radius:20px;height:14px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--teal),#26A69A);border-radius:20px;transition:width .5s ease"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:5px">
        <span style="font-size:10px;color:#aaa">Start: ${effectiveStart}kg</span>
        <span style="font-size:11px;font-weight:700;color:${doneSoFar>0?'var(--green)':'#aaa'}">${doneSoFar>0?'↓ '+doneSoFar.toFixed(1)+'kg lost':'Log weight to track'}</span>
        <span style="font-size:10px;color:#aaa">Goal: ${goalW}kg</span>
      </div>
    </div>`;

  if(!a) return `<div class="card">
    <div class="sec">📊 Metabolic Feedback</div>
    ${progressBar}
    <div style="font-size:12px;color:#aaa;text-align:center;padding:12px 0">Log weight for at least 3 days to see analytics</div>
  </div>`;

  const ma = movingAvg(hist, 7);
  const maLine = ma.length >= 2 ? (() => {
    const vals = ma.map(d=>d.avg);
    const mn = Math.min(...vals) - 0.3, mx = Math.max(...vals) + 0.3;
    const W=400, H=60, xs=W/Math.max(vals.length-1,1);
    const pts = vals.map((v,i)=>[i*xs, H-((v-mn)/(mx-mn))*H]);
    const path = pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    return `<div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:#888;margin-bottom:4px">7-Day Moving Average Weight</div>
      <svg viewBox="0 0 ${W} ${H+16}" style="width:100%;overflow:visible">
        <path d="${path}" fill="none" stroke="#26A69A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#26A69A"/>
          <text x="${p[0].toFixed(1)}" y="${(p[1]-6).toFixed(1)}" text-anchor="middle" font-size="8" fill="#555" font-family="Georgia,serif">${vals[i]}</text>
          <text x="${p[0].toFixed(1)}" y="${H+12}" text-anchor="middle" font-size="7" fill="#aaa" font-family="Georgia,serif">${ma[i].date.slice(5)}</text>`).join('')}
      </svg>
    </div>`;
  })() : '';

  return `<div class="card">
    <div class="sec">📊 Metabolic Feedback</div>
    ${progressBar}
    ${maLine}

function macroChart(hist, key, label, color, target) {
  const days = hist.slice(0, 14).reverse();
  if(days.length < 2) return '';
  const vals = days.map(d => Math.round(d[key]||0));
  const mx = Math.max(...vals, target) * 1.15;
  const W = 400, H = 70;
  const xs = W / Math.max(vals.length - 1, 1);
  const pts = vals.map((v,i) => [i*xs, H - (v/mx)*H]);
  const path = pts.map((p,i) => `${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const tY = (H - (target/mx)*H).toFixed(1);
  const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const hit = vals.filter(v => key==='carbs' ? v<=target*1.1 : v>=target*0.9).length;
  return `<div style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span style="font-size:12px;font-weight:700;color:${color}">${label}</span>
      <span style="font-size:11px;color:#888">avg ${avg} · target ${target} · ${hit}/${vals.length} days ✓</span>
    </div>
    <svg viewBox="0 0 ${W} ${H+18}" style="width:100%;overflow:visible">
      <line x1="0" y1="${tY}" x2="${W}" y2="${tY}" stroke="${color}" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${pts.map((p,i) => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="${color}"/>
        <text x="${p[0].toFixed(1)}" y="${(p[1]-7).toFixed(1)}" text-anchor="middle" font-size="8" fill="#666" font-family="Georgia,serif">${vals[i]}</text>
        <text x="${p[0].toFixed(1)}" y="${H+14}" text-anchor="middle" font-size="7.5" fill="#AAA" font-family="Georgia,serif">${days[i].date?.slice(5)||''}</text>`).join('')}
    </svg>
  </div>`;
}

function getAlarmEnabled(id) { return LS.get('alarm_'+id, true); }
function toggleAlarm(id) { LS.set('alarm_'+id, !getAlarmEnabled(id)); render(); }

function setAllAlarms() {
  const enabled = ALARMS.filter(a => getAlarmEnabled(a.id));
  if(enabled.length === 0) { alert('No alarms selected. Toggle some on first.'); return; }
  
  let i = 0;
  function setNext() {
    if(i >= enabled.length) {
      alert('✅ Done! All ' + enabled.length + ' alarms set.');
      return;
    }
    const alarm = enabled[i];
    i++;
    triggerAlarmIntent(alarm, setNext);
  }
  setNext();
}

function setOneAlarm(id) {
  const alarm = ALARMS.find(a=>a.id===id);
  if(!alarm) return;
  triggerAlarmIntent(alarm, null);
}

function triggerAlarmIntent(alarm, callback) {
  const [h,m] = alarm.time.split(':').map(Number);
  
  // Try multiple approaches in sequence for OnePlus OxygenOS compatibility
  const attempts = [
    // Standard Android intent
    `intent:#Intent;action=android.intent.action.SET_ALARM;i.android.intent.extra.alarm.HOUR=${h};i.android.intent.extra.alarm.MINUTES=${m};S.android.intent.extra.alarm.MESSAGE=${encodeURIComponent(alarm.label)};Z.android.intent.extra.alarm.SKIP_UI=false;Z.android.intent.extra.alarm.VIBRATE=true;end`,
    // OnePlus/OPPO clock package explicit
    `intent:#Intent;action=android.intent.action.SET_ALARM;i.android.intent.extra.alarm.HOUR=${h};i.android.intent.extra.alarm.MINUTES=${m};S.android.intent.extra.alarm.MESSAGE=${encodeURIComponent(alarm.label)};Z.android.intent.extra.alarm.SKIP_UI=false;package=com.oneplus.deskclock;end`,
    // Google clock fallback
    `intent:#Intent;action=android.intent.action.SET_ALARM;i.android.intent.extra.alarm.HOUR=${h};i.android.intent.extra.alarm.MINUTES=${m};S.android.intent.extra.alarm.MESSAGE=${encodeURIComponent(alarm.label)};Z.android.intent.extra.alarm.SKIP_UI=false;package=com.google.android.deskclock;end`,
  ];

  let tried = 0;
  function tryNext() {
    if(tried >= attempts.length) {
      if(callback) callback();
      return;
    }
    const a = document.createElement('a');
    a.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
    a.href = attempts[tried++];
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); }, 500);
    if(callback) setTimeout(callback, 4500);
  }
  tryNext();
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.createElement('button');
  btn.id = 'pwa-install-btn';
  btn.innerHTML = '📲 Install App';
  btn.style.cssText = 'position:fixed;bottom:80px;right:16px;padding:12px 20px;background:var(--teal);color:#fff;border:none;border-radius:24px;font-size:14px;font-weight:700;font-family:Georgia,serif;box-shadow:0 4px 14px rgba(0,105,92,.4);z-index:9999;cursor:pointer;';
  document.body.appendChild(btn);
  btn.addEventListener('click', async () => {
    btn.remove();
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
  });
});
window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('pwa-install-btn');
  if(btn) btn.remove();
  deferredPrompt = null;
});

  { id:'walk',   h:7,  m:0,  title:'🚶 Morning Walk Time',       body:'Fasted walk — best fat burn window. Lace up!' },

];

let notifScheduleTimer = null;

function getNotifEnabled(id) { return LS.get('notif_'+id, true); }
function toggleNotif(id) { LS.set('notif_'+id, !getNotifEnabled(id)); render(); }

async function requestNotifPermission() {
  if(!('Notification' in window)) { alert('Notifications not supported on this browser.'); return; }
  const perm = await Notification.requestPermission();
  if(perm === 'granted') {
    LS.set('notif_enabled', true);
    scheduleNotifications();
    render();
    alert('✅ Notifications enabled! You\'ll get reminders throughout the day.');
  } else {
    alert('Notifications blocked. Please allow notifications for this site in your browser settings:\nSettings → Apps → Chrome → Notifications → Allow');
  }
}

function disableNotifications() {
  LS.set('notif_enabled', false);
  if(notifScheduleTimer) { clearTimeout(notifScheduleTimer); notifScheduleTimer=null; }
  render();
}

function scheduleNotifications() {
  if(!('Notification' in window)) return;
  if(Notification.permission !== 'granted') return;
  if(!LS.get('notif_enabled', false)) return;
  if(notifScheduleTimer) clearTimeout(notifScheduleTimer);

  const now = new Date();
  const enabled = NOTIF_SCHEDULE.filter(n => getNotifEnabled(n.id));

  enabled.forEach(n => {
    const fire = new Date();
    fire.setHours(n.h, n.m, 0, 0);
    // If time already passed today, skip (will fire tomorrow via re-schedule)
    if(fire <= now) return;
    const delay = fire - now;
    setTimeout(() => {
      if(Notification.permission==='granted' && getNotifEnabled(n.id) && LS.get('notif_enabled',false)) {
        new Notification(n.title, {
          body: n.body,
          icon: '/icon-192.png',
          badge: '/icon-192.png',
          tag: n.id,
          requireInteraction: false,
        });
      }
    }, delay);
  });

  // Re-schedule at midnight for the next day
  const midnight = new Date();
  midnight.setHours(24, 0, 0, 0);
  notifScheduleTimer = setTimeout(scheduleNotifications, midnight - now);
}

// Auto-start scheduling if already enabled
if(LS.get('notif_enabled', false) && typeof Notification !== 'undefined' && Notification.permission === 'granted') {
  scheduleNotifications();
}

}
