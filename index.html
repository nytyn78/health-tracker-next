<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Health Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:20px;background:#f5f5f5;}
h1{text-align:center;margin-bottom:20px;}
.card{background:white;padding:15px;margin-bottom:20px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.row input{flex:1;min-width:100px;padding:8px;box-sizing:border-box;}
button{padding:8px 12px;margin-top:5px;cursor:pointer;}
ul{list-style:none;padding:0;margin:0;}
li{padding:6px 0;display:flex;justify-content:space-between;align-items:center;}
.chart-container{position:relative;height:280px;width:100%;}
canvas{width:100%!important;height:100%!important;}
#metabolic{font-weight:bold;font-size:1.1em;}
</style>
</head>
<body>
<h1>Health Tracker</h1>

<div class="card">
  <h2>Log Calories</h2>
  <div class="row">
    <input id="calorieInput" type="number" placeholder="Calories">
    <input id="calorieDate" type="date">
  </div>
  <button id="addCalories">Save</button>
  <button id="simulate">Load Test Data</button>
</div>

<div class="card">
  <h2>Add Weight</h2>
  <div class="row">
    <input id="weightInput" type="number" placeholder="Weight (kg)">
    <input id="weightDate" type="date">
  </div>
  <button id="addWeight">Add Weight</button>
</div>

<div class="card">
  <h2>Dashboard</h2>
  <p id="todayCalories"></p>
  <p id="avgCalories"></p>
  <p id="tdee"></p>
  <p id="balance"></p>
</div>

<div class="card">
  <h2>Weight Chart</h2>
  <div class="chart-container"><canvas id="chart"></canvas></div>
</div>

<div class="card"><h2>Weight History</h2><ul id="weightHistory"></ul></div>
<div class="card"><h2>Calorie History</h2><ul id="calorieHistory"></ul></div>
<div class="card"><h2>Metabolic Feedback</h2><p id="metabolic"></p></div>

<script>
const saved = localStorage.getItem("healthTracker")
const state = saved ? JSON.parse(saved) : {weights:[], calories:[], tdee:null}

function avgCalories(calories){
  if(!calories.length) return 0
  const last7 = calories.slice(-7)
  return Math.round(last7.reduce((a,b)=>a+b.calories,0)/last7.length)
}

function regressionSlope(weights){
  if(weights.length < 2) return 0
  const data = weights.slice(-14)
  let xSum=0,ySum=0,xySum=0,x2Sum=0
  const n=data.length
  for(let i=0;i<n;i++){
    xSum+=i; ySum+=data[i].weight
    xySum+=i*data[i].weight; x2Sum+=i*i
  }
  return (n*xySum-xSum*ySum)/(n*x2Sum-xSum*xSum)
}

function weightTrend(weights){
  if(weights.length < 7) return null
  return regressionSlope(weights) * 7
}

function rollingTDEE(avg, weights, prevTDEE){
  if(weights.length < 7) return prevTDEE
  const energyChange = regressionSlope(weights) * 7700
  const estimated = avg - energyChange
  if(!prevTDEE) return Math.round(estimated)
  return Math.round(prevTDEE*0.7 + estimated*0.3)
}

function energyBalance(today, tdee){
  return tdee ? today - tdee : 0
}

let weightChart = null

function movingAverage(data, w){
  return data.map((_,i)=>{
    const sub = data.slice(Math.max(0,i-w+1),i+1)
    return sub.reduce((a,b)=>a+b,0)/sub.length
  })
}

function renderWeightChart(weights, calories){
  const canvas = document.getElementById("chart")
  if(!canvas) return
  if(weightChart){ weightChart.destroy(); weightChart=null }
  if(!weights.length) return
  const ordered = [...weights].sort((a,b)=>a.date.localeCompare(b.date))
  const labels = ordered.map(w=>w.date.slice(5))
  const weightData = ordered.map(w=>Number(w.weight))
  const trendData = movingAverage(weightData,7)
  const cmap = {}
  calories.forEach(c=>{ cmap[c.date]=c.calories })
  const calorieData = ordered.map(w=>cmap[w.date]||null)
  const min = Math.min(...weightData)-0.2
  const max = Math.max(...weightData)+0.2
  weightChart = new Chart(canvas.getContext("2d"),{
    data:{
      labels,
      datasets:[
        {type:"line",label:"Weight",data:weightData,borderColor:"#2563eb",borderWidth:3,tension:0.35,pointRadius:4,yAxisID:"y"},
        {type:"line",label:"Trend",data:trendData,borderColor:"#ef4444",borderDash:[6,6],borderWidth:3,tension:0.35,pointRadius:0,yAxisID:"y"},
        {type:"bar",label:"Calories",data:calorieData,backgroundColor:"#cbd5f5",yAxisID:"y1"}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{position:"top"}},
      scales:{
        y:{min,max,ticks:{stepSize:0.2},title:{display:true,text:"Weight (kg)"}},
        y1:{position:"right",grid:{drawOnChartArea:false},title:{display:true,text:"Calories"}},
        x:{ticks:{maxRotation:45,minRotation:45}}
      }
    }
  })
}

function renderDashboard(today,avg,tdee,balance){
  document.getElementById("todayCalories").innerText = "Calories today: "+today
  document.getElementById("avgCalories").innerText   = "7-day average: "+avg+" kcal"
  document.getElementById("tdee").innerText          = "Estimated maintenance: "+(tdee||0)+" kcal"
  document.getElementById("balance").innerText       = "Energy balance: "+balance+" kcal"
}

function renderCalorieHistory(calories){
  const el = document.getElementById("calorieHistory")
  el.innerHTML = ""
  calories.slice().reverse().forEach(c=>{
    const li = document.createElement("li")
    li.innerText = c.calories+" kcal — "+c.date
    const btn = document.createElement("button")
    btn.innerText = "edit"
    btn.onclick = ()=>{ const v=prompt("Edit calories",c.calories); if(v!==null){c.calories=Number(v);refresh()} }
    li.appendChild(btn)
    el.appendChild(li)
  })
}

function renderWeightHistory(weights){
  const el = document.getElementById("weightHistory")
  el.innerHTML = ""
  weights.slice().reverse().forEach(w=>{
    const li = document.createElement("li")
    li.innerText = w.weight+" kg — "+w.date
    const btn = document.createElement("button")
    btn.innerText = "edit"
    btn.onclick = ()=>{ const v=prompt("Edit weight",w.weight); if(v!==null){w.weight=Number(v);refresh()} }
    li.appendChild(btn)
    el.appendChild(li)
  })
}

function refresh(){
  state.weights.sort((a,b)=>a.date.localeCompare(b.date))
  state.calories.sort((a,b)=>a.date.localeCompare(b.date))
  const todayDate = new Date().toISOString().slice(0,10)
  const todayEntry = state.calories.find(c=>c.date===todayDate)
  const today = todayEntry ? todayEntry.calories : 0
  const avg = avgCalories(state.calories)
  state.tdee = rollingTDEE(avg, state.weights, state.tdee)
  const balance = energyBalance(today, state.tdee)
  renderDashboard(today, avg, state.tdee, balance)
  const trend = weightTrend(state.weights)
  let text = ""
  if(trend !== null){
    const dir = trend > 0.05 ? "📈 Gaining" : trend < -0.05 ? "📉 Losing" : "➡️ Stable"
    text = dir+" — 7-day trend: "+(trend>=0?"+":"")+trend.toFixed(2)+" kg/week"
  }
  document.getElementById("metabolic").innerText = text
  renderCalorieHistory(state.calories)
  renderWeightHistory(state.weights)
  renderWeightChart(state.weights, state.calories)
  localStorage.setItem("healthTracker", JSON.stringify(state))
}

document.getElementById("addCalories").onclick = ()=>{
  const c = Number(document.getElementById("calorieInput").value)
  if(!c||c<=0){alert("Please enter a valid calorie amount.");return}
  let date = document.getElementById("calorieDate").value
  if(!date) date = new Date().toISOString().slice(0,10)
  const existing = state.calories.find(x=>x.date===date)
  if(existing) existing.calories=c
  else state.calories.push({calories:c,date})
  refresh()
}

document.getElementById("addWeight").onclick = ()=>{
  const w = Number(document.getElementById("weightInput").value)
  if(!w||w<=0){alert("Please enter a valid weight.");return}
  let date = document.getElementById("weightDate").value
  if(!date) date = new Date().toISOString().slice(0,10)
  state.weights.push({weight:w,date})
  refresh()
}

document.getElementById("simulate").onclick = ()=>{
  state.weights = [
    {weight:80,  date:"2026-03-01"},{weight:79.9,date:"2026-03-02"},
    {weight:79.8,date:"2026-03-03"},{weight:79.6,date:"2026-03-04"},
    {weight:79.5,date:"2026-03-05"},{weight:79.4,date:"2026-03-06"},
    {weight:79.2,date:"2026-03-07"},{weight:79.1,date:"2026-03-08"},
    {weight:79,  date:"2026-03-09"},{weight:78.9,date:"2026-03-10"},
    {weight:78.7,date:"2026-03-11"},{weight:78.6,date:"2026-03-12"},
    {weight:78.5,date:"2026-03-13"},{weight:78.4,date:"2026-03-14"}
  ]
  state.calories = [
    {calories:2300,date:"2026-03-08"},{calories:2200,date:"2026-03-09"},
    {calories:2100,date:"2026-03-10"},{calories:2000,date:"2026-03-11"},
    {calories:2100,date:"2026-03-12"},{calories:2200,date:"2026-03-13"},
    {calories:2100,date:"2026-03-14"}
  ]
  state.tdee = null
  refresh()
}

refresh()
</script>
</body>
</html>
