<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Health Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Health Tracker (Lab)</h1>

<div class="card">
<h2>Add Meal</h2>
<input id="mealName" placeholder="Food name">
<input id="mealCalories" type="number" placeholder="Calories">
<button id="addMeal">Add Meal</button>
</div>

<div class="card">
<h2>Add Weight</h2>
<input id="weightInput" type="number" placeholder="Weight">
<button id="addWeight">Add Weight</button>
</div>

<div class="card">
<h2>Today</h2>
<p id="calories">Total Calories: 0</p>
</div>

<div class="card">
<h2>Metabolic Feedback</h2>
<p id="metabolic"></p>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
