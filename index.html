<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Health Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Health Tracker</h1>


<div class="card">

<h2>Log Calories</h2>

<input id="calorieInput" type="number" placeholder="Calories">

<input id="calorieDate" type="date">

<button id="addCalories">Save</button>

<button id="simulate">Load Test Data</button>

</div>


<div class="card">

<h2>Add Weight</h2>

<input id="weightInput" type="number" placeholder="Weight">

<input id="weightDate" type="date">

<button id="addWeight">Add Weight</button>

</div>


<div class="card">

<h2>Dashboard</h2>

<p id="todayCalories"></p>

<p id="avgCalories"></p>

<p id="tdee"></p>

<p id="balance"></p>

</div>


<div class="card">

<h2>Calorie History</h2>

<ul id="calorieHistory"></ul>

</div>


<div class="card">

<h2>Metabolic Feedback</h2>

<p id="metabolic"></p>

</div>


<div class="card">

<h2>Weight History</h2>

<ul id="weightHistory"></ul>

</div>


<div class="card">

<h2>Weight Chart</h2>

<canvas id="chart"></canvas>

</div>


<script type="module" src="app.js"></script>

</body>

</html>
